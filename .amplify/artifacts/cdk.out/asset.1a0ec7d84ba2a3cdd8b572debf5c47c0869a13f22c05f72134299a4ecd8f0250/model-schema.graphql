type UserProfile @model @auth(rules: [{allow: owner, ownerField: "owner"},
  {allow: private, operations: [read]}])
{
  userId: ID!
  email: String! @index(queryField: "listUserProfileByEmail")
  firstName: String!
  lastName: String!
  displayName: String
  avatarUrl: String
  phone: String
  dateOfBirth: AWSDate
  gender: UserProfileGender
  city: String
  state: String
  country: String @default(value: "MX")
  bloodType: String
  emergencyContactName: String
  emergencyContactPhone: String
  emergencyContactRelationship: String
  shirtSize: UserProfileShirtSize
  role: UserProfileRole @index(queryField: "listUserProfileByRole")
  plusActive: Boolean @default(value: "false")
  plusPlan: String
  plusStripeSubId: String
  plusStartDate: AWSDateTime
  plusEndDate: AWSDateTime
  totalEvents: Int @default(value: "0")
  totalDistanceKm: Float @default(value: "0")
  totalPodiums: Int @default(value: "0")
  registrations: [Registration] @hasMany(references: ["userId"])
  results: [Result] @hasMany(references: ["userId"])
  organizedEvents: [Event] @hasMany(references: ["organizerId"])
  orders: [Order] @hasMany(references: ["userId"])
}

type Event @model @auth(rules: [{allow: private, operations: [read]},
  {allow: owner, operations: [create, update, delete], ownerField: "owner"},
  {allow: groups, operations: [create, update], groups: ["organizadores"]},
  {allow: groups, operations: [read], groups: ["atletas"]},
  {allow: public, provider: iam, operations: [read]}])
{
  slug: String! @index(queryField: "listEventBySlug")
  title: String!
  description: String
  shortDescription: String
  sport: EventSport @index(sortKeyFields: ["eventDate"], queryField: "listEventBySportAndEventDate")
  eventDate: AWSDateTime!
  eventEndDate: AWSDateTime
  registrationDeadline: AWSDateTime
  venue: String
  address: String
  city: String! @index(sortKeyFields: ["eventDate"], queryField: "listEventByCityAndEventDate")
  state: String
  country: String @default(value: "MX")
  latitude: Float
  longitude: Float
  imageUrl: String
  bannerUrl: String
  organizerId: ID!
  organizerName: String
  organizerLogo: String
  organizer: UserProfile @belongsTo(references: ["organizerId"])
  totalSpots: Int
  spotsRemaining: Int
  priceMin: Int
  priceMax: Int
  currency: String @default(value: "MXN")
  status: EventStatus @index(sortKeyFields: ["eventDate"], queryField: "listEventByStatusAndEventDate")
  featured: Boolean @default(value: "false")
  serialId: ID @index(sortKeyFields: ["eventDate"], queryField: "listEventBySerialIdAndEventDate")
  serial: Serial @belongsTo(references: ["serialId"])
  tags: [String]
  distances: [EventDistance] @hasMany(references: ["eventId"])
  registrations: [Registration] @hasMany(references: ["eventId"])
  results: [Result] @hasMany(references: ["eventId"])
}

type EventDistance @model @auth(rules: [{allow: private, operations: [read]},
  {allow: groups, groups: ["organizadores"]},
  {allow: public, provider: iam, operations: [read]}])
{
  eventId: ID! @index(queryField: "listEventDistanceByEventId")
  event: Event @belongsTo(references: ["eventId"])
  name: String!
  distanceKm: Float
  price: Int!
  currency: String @default(value: "MXN")
  spotsTotal: Int
  spotsRemaining: Int
  category: EventDistanceCategory
  minAge: Int
  maxAge: Int
}

type Registration @model @auth(rules: [{allow: owner, ownerField: "owner"},
  {allow: groups, operations: [read, update], groups: ["organizadores"]}])
{
  userId: ID! @index(sortKeyFields: ["eventId"], queryField: "listRegistrationByUserIdAndEventId")
  user: UserProfile @belongsTo(references: ["userId"])
  eventId: ID! @index(sortKeyFields: ["status"], queryField: "listRegistrationByEventIdAndStatus")
  event: Event @belongsTo(references: ["eventId"])
  distanceId: ID!
  distanceName: String
  distanceKm: Float
  category: RegistrationCategory
  bibNumber: Int
  status: RegistrationStatus
  paymentStatus: RegistrationPaymentStatus
  stripePaymentIntentId: String
  amountPaid: Int
  currency: String @default(value: "MXN")
  registeredAt: AWSDateTime
  checkedInAt: AWSDateTime
  waiverSigned: Boolean @default(value: "false")
  teamName: String
  promoCode: String
  shirtSize: RegistrationShirtSize
}

type Result @model @auth(rules: [{allow: private, operations: [read]},
  {allow: groups, groups: ["organizadores"]},
  {allow: public, provider: iam, operations: [read]}])
{
  eventId: ID! @index(sortKeyFields: ["chipTimeSeconds"], queryField: "listResultByEventIdAndChipTimeSeconds")
  event: Event @belongsTo(references: ["eventId"])
  userId: ID! @index(queryField: "listResultByUserId")
  user: UserProfile @belongsTo(references: ["userId"])
  registrationId: ID
  distanceName: String!
  bibNumber: Int
  athleteName: String
  gender: ResultGender
  ageGroup: String
  overallRank: Int
  genderRank: Int
  ageGroupRank: Int
  chipTime: String
  chipTimeSeconds: Float
  gunTime: String
  gunTimeSeconds: Float
  pace: String
  status: ResultStatus
}

type Serial @model @auth(rules: [{allow: private, operations: [read]},
  {allow: groups, groups: ["organizadores"]},
  {allow: public, provider: iam, operations: [read]}])
{
  slug: String! @index(queryField: "listSerialBySlug")
  name: String!
  description: String
  imageUrl: String
  bannerUrl: String
  color: String
  organizerId: ID
  year: Int
  totalEvents: Int
  cities: [String]
  sports: [String]
  scoringRules: String
  status: SerialStatus
  events: [Event] @hasMany(references: ["serialId"])
}

type Order @model @auth(rules: [{allow: owner, ownerField: "owner"}])
{
  userId: ID! @index(queryField: "listOrderByUserId")
  user: UserProfile @belongsTo(references: ["userId"])
  type: OrderType
  subtotal: Int
  discount: Int @default(value: "0")
  total: Int!
  currency: String @default(value: "MXN")
  promoCode: String
  paymentMethod: OrderPaymentMethod
  stripePaymentIntentId: String @index(queryField: "listOrderByStripePaymentIntentId")
  stripeSessionId: String
  status: OrderStatus
  paidAt: AWSDateTime
  refundedAt: AWSDateTime
  itemsJson: String
}

type Article @model @auth(rules: [{allow: private, operations: [read]},
  {allow: groups, groups: ["organizadores"]},
  {allow: groups, operations: [read], groups: ["atletas"]},
  {allow: public, provider: iam, operations: [read]}])
{
  slug: String! @index(queryField: "listArticleBySlug")
  title: String!
  excerpt: String
  body: String
  category: ArticleCategory @index(sortKeyFields: ["publishedAt"], queryField: "listArticleByCategoryAndPublishedAt")
  imageUrl: String
  authorId: ID
  authorName: String
  readTimeMinutes: Int
  tags: [String]
  status: ArticleStatus
  publishedAt: AWSDateTime
}

enum UserProfileGender {
  M
  F
  NB
  OTHER
}

enum UserProfileShirtSize {
  XS
  S
  M
  L
  XL
  XXL
}

enum UserProfileRole {
  ATLETA
  ORGANIZADOR
  ADMIN
}

enum EventSport {
  RUNNING
  CICLISMO
  NATACION
  TRAIL
  TRIATLON
  OCR
  SENDERISMO
  DOWNHILL
  OTRO
}

enum EventStatus {
  DRAFT
  PUBLISHED
  SOLDOUT
  CANCELLED
  COMPLETED
}

enum EventDistanceCategory {
  ELITE
  GENERAL
  FUN
}

enum RegistrationCategory {
  ELITE
  GENERAL
  FUN
}

enum RegistrationStatus {
  PENDING
  CONFIRMED
  CANCELLED
  DNS
  DNF
  FINISHED
}

enum RegistrationPaymentStatus {
  PENDING
  PAID
  REFUNDED
}

enum RegistrationShirtSize {
  XS
  S
  M
  L
  XL
  XXL
}

enum ResultGender {
  M
  F
  NB
  OTHER
}

enum ResultStatus {
  FINISHED
  DNF
  DNS
  DQ
}

enum SerialStatus {
  UPCOMING
  ACTIVE
  COMPLETED
}

enum OrderType {
  REGISTRATION
  PLUS_SUBSCRIPTION
  MERCHANDISE
}

enum OrderPaymentMethod {
  CARD
  OXXO
  TRANSFER
}

enum OrderStatus {
  PENDING
  PAID
  REFUNDED
  FAILED
}

enum ArticleCategory {
  RUNNING
  NUTRICION
  CICLISMO
  ENTRENAMIENTO
  EQUIPAMIENTO
}

enum ArticleStatus {
  DRAFT
  PUBLISHED
}

type Mutation {
  switchToOrganizer: Boolean @function(name: "switchToOrganizer") @auth(rules: [{allow: private}])
  createCheckoutSession(eventId: String!, distanceId: String!, distanceName: String!, eventTitle: String!, priceInCentavos: Int!, userId: String!, userEmail: String!, registrationId: String!): String @function(name: "createCheckout") @auth(rules: [{allow: private}])
}